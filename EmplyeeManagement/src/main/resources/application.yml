server:
  port: 8081
#  servlet:
#    context-path: /api
spring:
  application:
    name: employee-management
  datasource:
      url: jdbc:mysql://localhost:3306/dineshdb
      username: root
      password: Dinesh@123
      driver-class-name: com.mysql.cj.jdbc.Driver
#  security:
#    user:
#      name: admin
#      password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  jackson:
    serialization:
      fail-onempty-beans: false
  main:
    allow-circular-references: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

      #swagger
  springdoc:
    api-doc:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      operationSorter: method
  #Actuater
  management:
    endpoints:
      web:
        exposure:
          include: helth,info,metrics
    endpoint:
      health:
        show-details: always

  #Logging
  logging:
    level:
      root: info
      org.springframework.web: DEBUG
      org.hibernate.SQL: DEBUG
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

  #JWT
